<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>InstaCare — انستا كير</title>
<style>
  :root{
    --blue:#2B6CB0; --blue-dark:#234e7d; --blue-light:#EBF3FB; --blue-soft:#DCEAF7;
    --green:#2F9E6B; --green-light:#E6F5EE;
    --red:#D14343; --red-light:#FCEBEB;
    --ink:#1A2433; --muted:#7B8794; --line:#E4E9F0; --bg:#F6F9FC; --white:#fff;
    --shadow:0 2px 10px rgba(43,108,176,.08); --shadow-lg:0 8px 28px rgba(43,108,176,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI",Tahoma,"Cairo",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    max-width:480px; margin:0 auto; min-height:100vh; position:relative;
    box-shadow:0 0 40px rgba(0,0,0,.05);
  }
  .app{padding-bottom:24px;min-height:100vh;background:var(--bg)}

  /* Header */
  header{
    background:var(--white); color:var(--ink); padding:14px 16px;
    display:flex;align-items:center;gap:10px; position:sticky;top:0;z-index:50;
    border-bottom:1px solid var(--line);
  }
  header .back{
    background:var(--blue-light);border:none;color:var(--blue);width:38px;height:38px;
    border-radius:12px;font-size:20px;cursor:pointer;display:flex;align-items:center;
    justify-content:center;flex-shrink:0;transition:.15s
  }
  header .back:active{transform:scale(.92)}
  header .titles{flex:1;min-width:0}
  header h1{font-size:17px;margin:0;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  header .sub{font-size:12px;color:var(--muted);margin-top:1px}
  .logo-dot{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--blue),#4a90d9);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}

  /* Brand bar */
  .brand{background:linear-gradient(135deg,var(--blue),#3f86d4);color:#fff;padding:20px 18px 22px;
    display:flex;align-items:center;gap:12px}
  .brand .mark{width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;font-size:24px}
  .brand h1{margin:0;font-size:22px;font-weight:800;letter-spacing:-.3px}
  .brand p{margin:2px 0 0;font-size:12.5px;opacity:.9}

  .container{padding:16px}
  .section-label{font-size:13px;color:var(--muted);font-weight:700;margin:6px 2px 12px;display:flex;
    align-items:center;justify-content:space-between}

  /* Cards / list rows */
  .card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:14px;
    box-shadow:var(--shadow);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:13px;
    margin-bottom:11px}
  .card:active{transform:scale(.985);box-shadow:var(--shadow-lg)}
  .avatar{width:48px;height:48px;border-radius:50%;background:var(--blue-light);color:var(--blue);
    display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
  .avatar.green{background:var(--green-light);color:var(--green)}
  .card-body{flex:1;min-width:0}
  .card-title{font-weight:700;font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{font-size:12.5px;color:var(--muted);margin-top:2px}
  .chev{color:var(--blue);opacity:.5;font-size:20px;flex-shrink:0}
  .count-badge{background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:700;
    padding:3px 10px;border-radius:20px;flex-shrink:0}

  /* Section icons inside specialty */
  .sec-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;
    font-size:22px;flex-shrink:0}
  .ic-treat{background:var(--blue-light)} .ic-lab{background:#EDE9FB} .ic-xray{background:#E9F4FB}
  .ic-physio{background:var(--green-light)} .ic-note{background:#FFF3E0}

  /* Doctor note special card */
  .note-card{background:linear-gradient(135deg,#FFF8EE,#FFF3E0);border:1px solid #F3DDB8;border-radius:16px;
    padding:15px;margin-bottom:14px}
  .note-card .nh{display:flex;align-items:center;gap:8px;font-weight:700;color:#B8772A;font-size:14px;margin-bottom:8px}
  .note-card .nt{font-size:14.5px;color:var(--ink);white-space:pre-wrap;line-height:1.6}
  .note-card .nm{font-size:12px;color:var(--muted);margin-top:9px;border-top:1px dashed #E8D3A8;padding-top:8px}
  .note-empty{color:var(--muted);font-size:13.5px}

  /* Buttons */
  .btn{background:var(--blue);color:#fff;border:none;border-radius:13px;padding:14px;font-size:15px;
    font-weight:700;width:100%;cursor:pointer;transition:.15s;font-family:inherit}
  .btn:active{transform:scale(.98);background:var(--blue-dark)}
  .btn.green{background:var(--green)} .btn.ghost{background:var(--blue-light);color:var(--blue)}
  .btn.danger{background:var(--red-light);color:var(--red)}
  .fab{position:sticky;bottom:16px;margin:16px;width:calc(100% - 32px);box-shadow:var(--shadow-lg)}

  /* Empty state */
  .empty{text-align:center;padding:46px 20px;color:var(--muted)}
  .empty .e-ic{font-size:48px;margin-bottom:12px;opacity:.5}
  .empty p{font-size:14px;margin:4px 0}

  /* Doc grid */
  .doc-card{background:var(--white);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    box-shadow:var(--shadow);cursor:pointer;margin-bottom:12px;transition:.15s}
  .doc-card:active{transform:scale(.98)}
  .doc-card img{width:100%;height:150px;object-fit:cover;background:var(--blue-light);display:block}
  .doc-card .di{padding:11px 13px}
  .doc-card .dt{font-weight:700;font-size:14.5px}
  .doc-card .dd{font-size:12px;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between}
  .new-tag{background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px}

  /* Modal / sheet */
  .overlay{position:fixed;inset:0;background:rgba(20,33,51,.5);z-index:100;display:none;
    align-items:flex-end;justify-content:center}
  .overlay.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:20px 18px 26px;
    max-height:92vh;overflow:auto;animation:slideUp .25s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet h2{margin:0 0 4px;font-size:19px}
  .sheet .grab{width:40px;height:4px;background:var(--line);border-radius:4px;margin:0 auto 14px}
  label{display:block;font-size:13px;font-weight:700;color:var(--ink);margin:14px 0 6px}
  input,textarea,select{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:12px;
    font-size:15px;font-family:inherit;background:var(--bg);color:var(--ink);outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--blue);background:#fff}
  textarea{resize:vertical;min-height:80px}
  .row2{display:flex;gap:10px}.row2>div{flex:1}

  /* photo picker */
  .photo-pick{border:2px dashed var(--blue-soft);border-radius:14px;padding:24px;text-align:center;
    color:var(--blue);cursor:pointer;background:var(--blue-light);font-weight:700;font-size:14px}
  .photo-pick .pp-ic{font-size:34px;display:block;margin-bottom:6px}
  .photo-preview{width:100%;border-radius:14px;margin-top:10px;max-height:240px;object-fit:cover;display:block}

  /* type chips */
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{padding:9px 14px;border-radius:11px;border:1.5px solid var(--line);background:var(--bg);
    font-size:13px;font-weight:700;cursor:pointer;color:var(--muted)}
  .chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}

  /* full view */
  .full-img{width:100%;border-radius:14px;margin-bottom:14px;box-shadow:var(--shadow)}
  .detail-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
  .detail-row .k{color:var(--muted)} .detail-row .v{font-weight:700}

  .search{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:13px;background:#fff;
    font-size:14px;margin-bottom:14px;font-family:inherit}

  .grid-spec{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .spec-tile{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px 14px;
    box-shadow:var(--shadow);cursor:pointer;transition:.15s;text-align:center}
  .spec-tile:active{transform:scale(.97)}
  .spec-tile .st-ic{width:50px;height:50px;border-radius:14px;background:var(--blue-light);color:var(--blue);
    display:flex;align-items:center;justify-content:center;font-size:25px;margin:0 auto 9px}
  .spec-tile .st-name{font-weight:700;font-size:14.5px}
  .spec-tile .st-count{font-size:11.5px;color:var(--muted);margin-top:3px}
  .add-tile{border:2px dashed var(--blue-soft);background:var(--blue-light);color:var(--blue);
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;
    border-radius:16px;cursor:pointer;font-size:14px;min-height:118px}
  .add-tile .at-ic{font-size:30px;margin-bottom:4px}
</style>
</head>
<body>
<div class="app" id="app"></div>

<!-- generic sheet -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>

<script>
/* ---------------- Data layer (localStorage) ---------------- */
const KEY="instacare_v1";
let _mem=null; // in-memory fallback if localStorage is blocked (e.g. sandboxed preview)
let DB=load();
function load(){
  try{const raw=localStorage.getItem(KEY);return raw?JSON.parse(raw):{profiles:[]}}
  catch(e){return _mem||{profiles:[]}}
}
function save(){
  _mem=DB;
  try{localStorage.setItem(KEY,JSON.stringify(DB))}catch(e){/* storage blocked — keep in memory */}
}
function uid(){return Math.random().toString(36).slice(2,10)}
function today(){const d=new Date();return d.toISOString().slice(0,10)}
function fmtDate(s){if(!s)return"";const[y,m,d]=s.split("-");return `${d}/${m}/${y}`}

/* sections inside every specialty */
const SECTIONS=[
  {id:"note", name:"ملاحظة آخر دكتور", icon:"📝", cls:"ic-note"},
  {id:"treat",name:"علاج / روشتات",   icon:"🩺", cls:"ic-treat"},
  {id:"lab",  name:"تحاليل",          icon:"🔬", cls:"ic-lab"},
  {id:"xray", name:"أشعة",            icon:"📷", cls:"ic-xray"},
  {id:"physio",name:"علاج طبيعي",     icon:"🏃", cls:"ic-physio"},
];
const SPEC_PRESETS=["قلب","عظام","أسنان","باطنة","جلدية","أنف وأذن","عيون","مسالك","نساء","أطفال","مخ وأعصاب","صدر"];
const SPEC_ICON="🏥";

/* ---------------- Navigation state ---------------- */
let nav={view:"home", pid:null, sid:null, sec:null};
function go(v,opts={}){nav={...nav,view:v,...opts};render();window.scrollTo(0,0)}

/* helpers to fetch entities */
const getP=()=>DB.profiles.find(p=>p.id===nav.pid);
const getS=()=>{const p=getP();return p&&p.specs.find(s=>s.id===nav.sid)};

/* ---------------- Render ---------------- */
function render(){
  const app=document.getElementById("app");
  let h="";
  if(nav.view==="home") h=viewHome();
  else if(nav.view==="profile") h=viewProfile();
  else if(nav.view==="specialty") h=viewSpecialty();
  else if(nav.view==="section") h=viewSection();
  else if(nav.view==="doc") h=viewDoc();
  app.innerHTML=h;
}

function header(title,sub,onBack){
  return `<header>
    ${onBack?`<button class="back" onclick="${onBack}">‹</button>`:`<div class="logo-dot">＋</div>`}
    <div class="titles"><h1>${title}</h1>${sub?`<div class="sub">${sub}</div>`:""}</div>
  </header>`;
}

/* ---- HOME: profiles ---- */
function viewHome(){
  let cards = DB.profiles.length ? DB.profiles.map(p=>{
    const docs=countDocs(p);
    return `<div class="card" onclick="go('profile',{pid:'${p.id}'})">
      <div class="avatar ${p.color||''}">${initial(p.name)}</div>
      <div class="card-body">
        <div class="card-title">${esc(p.name)}</div>
        <div class="card-meta">${p.relation?esc(p.relation)+" • ":""}${p.specs.length} تخصص • ${docs} وثيقة</div>
      </div><div class="chev">‹</div>
    </div>`;
  }).join("") : empty("👤","مفيش ملفات لسه","اعمل ملف ليك ولأفراد عيلتك");

  return `
  <div class="brand">
    <div class="mark">＋</div>
    <div><h1>انستا كير</h1><p>كل تاريخك الطبي في مكان واحد</p></div>
  </div>
  <div class="container">
    <div class="section-label"><span>الملفات الصحية</span></div>
    ${cards}
  </div>
  <button class="btn fab" onclick="sheetProfile()">＋ إضافة ملف جديد</button>`;
}

/* ---- PROFILE: specialties ---- */
function viewProfile(){
  const p=getP(); if(!p)return go("home");
  let tiles=p.specs.map(s=>{
    const c=specCount(s);
    return `<div class="spec-tile" onclick="go('specialty',{sid:'${s.id}'})">
      <div class="st-ic">${SPEC_ICON}</div>
      <div class="st-name">${esc(s.name)}</div>
      <div class="st-count">${c} وثيقة</div>
    </div>`;
  }).join("");
  tiles+=`<div class="add-tile" onclick="sheetSpec()"><div class="at-ic">＋</div>إضافة تخصص</div>`;

  return header(p.name, (p.relation||"")+" "+(p.birth?"• "+p.birth:""), "go('home')")+`
  <div class="container">
    <div class="section-label"><span>التخصصات</span></div>
    <div class="grid-spec">${tiles}</div>
    <div style="margin-top:18px">
      <button class="btn ghost" onclick="sheetProfile('${p.id}')">✎ تعديل بيانات الملف</button>
    </div>
  </div>`;
}

/* ---- SPECIALTY: the 5 sections ---- */
function viewSpecialty(){
  const p=getP(),s=getS(); if(!s)return go("profile");
  let rows=SECTIONS.map(sec=>{
    if(sec.id==="note"){
      const n=s.note;
      return `<div class="card" onclick="sheetNote()">
        <div class="sec-icon ${sec.cls}">${sec.icon}</div>
        <div class="card-body"><div class="card-title">${sec.name}</div>
        <div class="card-meta">${n&&n.text?esc(truncate(n.text,40)):"اضغط لإضافة ملاحظة"}</div></div>
        <div class="chev">‹</div></div>`;
    }
    const cnt=(s.docs[sec.id]||[]).length;
    return `<div class="card" onclick="go('section',{sec:'${sec.id}'})">
      <div class="sec-icon ${sec.cls}">${sec.icon}</div>
      <div class="card-body"><div class="card-title">${sec.name}</div>
      <div class="card-meta">${cnt} وثيقة</div></div>
      <span class="count-badge">${cnt}</span></div>`;
  }).join("");

  // doctor note highlighted on top if exists
  let noteBox="";
  if(s.note&&s.note.text){
    noteBox=`<div class="note-card" onclick="sheetNote()">
      <div class="nh">📝 آخر ملاحظة من الدكتور</div>
      <div class="nt">${esc(s.note.text)}</div>
      <div class="nm">${s.note.doctor?"د. "+esc(s.note.doctor)+" • ":""}${fmtDate(s.note.date)||""}${s.note.next?" • الجاية: "+esc(s.note.next):""}</div>
    </div>`;
  }

  return header(s.name, p.name, "go('profile')")+`
  <div class="container">
    ${noteBox}
    <div class="section-label"><span>الأقسام</span></div>
    ${rows}
    <div style="margin-top:14px"><button class="btn danger" onclick="delSpec()">🗑 حذف التخصص</button></div>
  </div>`;
}

/* ---- SECTION: documents list ---- */
function viewSection(){
  const p=getP(),s=getS(); if(!s)return go("profile");
  const sec=SECTIONS.find(x=>x.id===nav.sec);
  let docs=(s.docs[nav.sec]||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const newest=docs[0]?.id;
  let body = docs.length ? docs.map(d=>`
    <div class="doc-card" onclick="go('doc',{docId:'${d.id}'})">
      ${d.img?`<img src="${d.img}" alt="">`:`<div style="height:90px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:34px">📄</div>`}
      <div class="di"><div class="dt">${esc(d.title)} ${d.id===newest?'<span class="new-tag">جديد</span>':''}</div>
      <div class="dd"><span>${fmtDate(d.date)}</span>${d.note?`<span>📝</span>`:""}</div></div>
    </div>`).join("") : empty(sec.icon,"مفيش وثائق هنا","صوّر أو ارفع أول وثيقة");

  nav._docList=docs; // for navigation
  return header(sec.name, `${p.name} • ${s.name}`, "go('specialty')")+`
  <div class="container">${body}</div>
  <button class="btn fab" onclick="sheetDoc()">📷 إضافة / تصوير وثيقة</button>`;
}

/* ---- DOC detail ---- */
function viewDoc(){
  const p=getP(),s=getS(); if(!s)return go("profile");
  const d=(s.docs[nav.sec]||[]).find(x=>x.id===nav.docId); if(!d)return go("section");
  return header(d.title, SECTIONS.find(x=>x.id===nav.sec).name, "go('section')")+`
  <div class="container">
    ${d.img?`<img class="full-img" src="${d.img}">`:`<div class="full-img" style="height:160px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:50px;border-radius:14px">📄</div>`}
    <div class="detail-row"><span class="k">التاريخ</span><span class="v">${fmtDate(d.date)}</span></div>
    ${d.doctor?`<div class="detail-row"><span class="k">الدكتور / المكان</span><span class="v">${esc(d.doctor)}</span></div>`:""}
    ${d.note?`<div style="margin-top:14px"><div class="section-label">ملاحظات</div><div style="background:#fff;padding:14px;border-radius:13px;border:1px solid var(--line);white-space:pre-wrap;font-size:14.5px">${esc(d.note)}</div></div>`:""}
    <div style="margin-top:18px;display:flex;flex-direction:column;gap:10px">
      <button class="btn ghost" onclick="sheetDoc('${d.id}')">✎ تعديل</button>
      <button class="btn danger" onclick="delDoc('${d.id}')">🗑 حذف الوثيقة</button>
    </div>
  </div>`;
}

/* ---------------- Sheets (forms) ---------------- */
function openSheet(html){document.getElementById("sheet").innerHTML=`<div class="grab"></div>`+html;document.getElementById("overlay").classList.add("show")}
function closeSheet(){document.getElementById("overlay").classList.remove("show")}

/* profile form */
function sheetProfile(id){
  const p=id?DB.profiles.find(x=>x.id===id):null;
  openSheet(`
    <h2>${p?"تعديل الملف":"ملف جديد"}</h2>
    <label>الاسم</label><input id="f_name" value="${p?esc(p.name):""}" placeholder="مثلاً: أحمد محمد">
    <div class="row2">
      <div><label>صلة القرابة</label><input id="f_rel" value="${p?esc(p.relation||""):""}" placeholder="أنا / ابني / ماما"></div>
      <div><label>تاريخ الميلاد</label><input id="f_birth" type="date" value="${p?p.birth||"":""}"></div>
    </div>
    <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
      <button class="btn" onclick="saveProfile('${id||""}')">حفظ</button>
      ${p?`<button class="btn danger" onclick="delProfile('${id}')">حذف الملف</button>`:""}
    </div>`);
}
function saveProfile(id){
  const name=val("f_name").trim(); if(!name)return alert("اكتب الاسم");
  const rel=val("f_rel").trim(), birth=val("f_birth");
  if(id){const p=DB.profiles.find(x=>x.id===id);p.name=name;p.relation=rel;p.birth=birth;}
  else DB.profiles.push({id:uid(),name,relation:rel,birth,color:DB.profiles.length%2?"green":"",specs:[]});
  save();closeSheet();render();
}
function delProfile(id){if(!confirm("حذف الملف وكل وثائقه؟"))return;DB.profiles=DB.profiles.filter(x=>x.id!==id);save();closeSheet();go("home")}

/* specialty form */
function sheetSpec(){
  const chips=SPEC_PRESETS.map(n=>`<div class="chip" onclick="pickSpec(this,'${n}')">${n}</div>`).join("");
  openSheet(`
    <h2>إضافة تخصص</h2>
    <label>اختر تخصص</label><div class="chips" style="margin-bottom:6px">${chips}</div>
    <label>أو اكتب تخصص آخر</label><input id="f_spec" placeholder="اسم التخصص">
    <button class="btn" style="margin-top:20px" onclick="saveSpec()">إضافة</button>`);
}
function pickSpec(el,n){document.getElementById("f_spec").value=n;document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));el.classList.add("active")}
function saveSpec(){
  const name=val("f_spec").trim(); if(!name)return alert("اختر أو اكتب تخصص");
  getP().specs.push({id:uid(),name,note:null,docs:{}});save();closeSheet();render();
}
function delSpec(){if(!confirm("حذف التخصص وكل أقسامه؟"))return;const p=getP();p.specs=p.specs.filter(s=>s.id!==nav.sid);save();go("profile")}

/* doctor note form */
function sheetNote(){
  const s=getS(); const n=s.note||{};
  openSheet(`
    <h2>📝 ملاحظة آخر دكتور</h2>
    <label>الملاحظة / التشخيص</label>
    <textarea id="n_text" placeholder="اكتب ملخّص كلام الدكتور...">${n.text?esc(n.text):""}</textarea>
    <div class="row2">
      <div><label>اسم الدكتور</label><input id="n_doc" value="${n.doctor?esc(n.doctor):""}" placeholder="د. ..."></div>
      <div><label>تاريخ الزيارة</label><input id="n_date" type="date" value="${n.date||today()}"></div>
    </div>
    <label>الخطوة الجاية</label><input id="n_next" value="${n.next?esc(n.next):""}" placeholder="مثلاً: إعادة تحليل بعد شهر">
    <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
      <button class="btn" onclick="saveNote()">حفظ</button>
      ${n.text?`<button class="btn danger" onclick="clearNote()">مسح الملاحظة</button>`:""}
    </div>`);
}
function saveNote(){
  const text=val("n_text").trim(); if(!text)return alert("اكتب الملاحظة");
  getS().note={text,doctor:val("n_doc").trim(),date:val("n_date"),next:val("n_next").trim()};
  save();closeSheet();render();
}
function clearNote(){getS().note=null;save();closeSheet();render()}

/* document form */
let _img=null;
function sheetDoc(id){
  const s=getS(); _img=null;
  let d=null;
  if(id){d=(s.docs[nav.sec]||[]).find(x=>x.id===id);_img=d.img||null;}
  openSheet(`
    <h2>${d?"تعديل وثيقة":"وثيقة جديدة"}</h2>
    <div class="photo-pick" onclick="document.getElementById('f_file').click()">
      <span class="pp-ic">📷</span> اضغط للتصوير أو اختيار صورة
    </div>
    <input id="f_file" type="file" accept="image/*" capture="environment" style="display:none" onchange="onPhoto(event)">
    <img id="prev" class="photo-preview" style="${_img?'':'display:none'}" src="${_img||''}">
    <label>عنوان الوثيقة</label><input id="d_title" value="${d?esc(d.title):""}" placeholder="مثلاً: صورة رنين">
    <div class="row2">
      <div><label>التاريخ</label><input id="d_date" type="date" value="${d?d.date:today()}"></div>
      <div><label>الدكتور / المكان</label><input id="d_doc" value="${d?esc(d.doctor||""):""}" placeholder="اختياري"></div>
    </div>
    <label>ملاحظات</label><textarea id="d_note" placeholder="اختياري">${d?esc(d.note||""):""}</textarea>
    <button class="btn" style="margin-top:20px" onclick="saveDoc('${id||""}')">حفظ الوثيقة</button>`);
}
function onPhoto(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{ // compress via canvas to keep localStorage small
    const img=new Image();
    img.onload=()=>{
      const max=1100,sc=Math.min(1,max/Math.max(img.width,img.height));
      const c=document.createElement("canvas");c.width=img.width*sc;c.height=img.height*sc;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      _img=c.toDataURL("image/jpeg",.7);
      const pv=document.getElementById("prev");pv.src=_img;pv.style.display="block";
    };img.src=ev.target.result;
  };r.readAsDataURL(file);
}
function saveDoc(id){
  const title=val("d_title").trim(); if(!title)return alert("اكتب عنوان الوثيقة");
  const s=getS(); if(!s.docs[nav.sec])s.docs[nav.sec]=[];
  const data={title,date:val("d_date"),doctor:val("d_doc").trim(),note:val("d_note").trim(),img:_img};
  if(id){const d=s.docs[nav.sec].find(x=>x.id===id);Object.assign(d,data);}
  else s.docs[nav.sec].push({id:uid(),...data});
  save();closeSheet();render();
}
function delDoc(id){if(!confirm("حذف الوثيقة؟"))return;const s=getS();s.docs[nav.sec]=s.docs[nav.sec].filter(x=>x.id!==id);save();go("section")}

/* ---------------- utils ---------------- */
function val(id){return document.getElementById(id).value}
function esc(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function initial(n){return(n||"؟").trim()[0]||"؟"}
function truncate(s,n){return s.length>n?s.slice(0,n)+"…":s}
function empty(ic,t,sub){return `<div class="empty"><div class="e-ic">${ic}</div><p style="font-weight:700;color:var(--ink)">${t}</p><p>${sub}</p></div>`}
function countDocs(p){let c=0;p.specs.forEach(s=>c+=specCount(s));return c}
function specCount(s){let c=0;Object.values(s.docs||{}).forEach(a=>c+=a.length);return c}

/* seed demo on first run (optional, light) */
if(!DB.profiles.length){
  DB.profiles=[];save();
}
render();
</script>
</body>
</html>
