<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2B6CB0">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<title>InstaCare — انستا كير</title>
<style>
  :root{
    --blue:#2B6CB0; --blue-dark:#234e7d; --blue-light:#EBF3FB; --blue-soft:#DCEAF7;
    --green:#2F9E6B; --green-light:#E6F5EE;
    --red:#D14343; --red-light:#FCEBEB; --amber:#B8772A;
    --ink:#1A2433; --muted:#7B8794; --line:#E4E9F0; --bg:#F4F8FC; --white:#fff;
    --shadow:0 2px 12px rgba(43,108,176,.09); --shadow-lg:0 10px 30px rgba(43,108,176,.18);
    --grad:linear-gradient(135deg,#2B6CB0,#4a90d9);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI",Tahoma,"Cairo",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    max-width:480px; margin:0 auto; min-height:100vh; position:relative;
    box-shadow:0 0 40px rgba(0,0,0,.06);
  }
  .app{padding-bottom:30px;min-height:100vh;background:var(--bg)}

  header{
    background:var(--white); color:var(--ink); padding:14px 16px;
    display:flex;align-items:center;gap:10px; position:sticky;top:0;z-index:50;
    border-bottom:1px solid var(--line); box-shadow:0 1px 0 rgba(0,0,0,.01);
  }
  header .back{background:var(--blue-light);border:none;color:var(--blue);width:38px;height:38px;
    border-radius:12px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:.15s}
  header .back:active{transform:scale(.92)}
  header .titles{flex:1;min-width:0}
  header h1{font-size:17px;margin:0;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  header .sub{font-size:12px;color:var(--muted);margin-top:1px}
  .logo-dot{width:36px;height:36px;border-radius:11px;background:var(--grad);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:19px;flex-shrink:0;font-weight:700}

  .brand{background:var(--grad);color:#fff;padding:22px 18px 26px;display:flex;align-items:center;gap:13px;
    border-radius:0 0 26px 26px;box-shadow:var(--shadow-lg)}
  .brand .mark{width:50px;height:50px;border-radius:14px;background:rgba(255,255,255,.2);
    display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700}
  .brand h1{margin:0;font-size:23px;font-weight:800;letter-spacing:-.3px}
  .brand p{margin:3px 0 0;font-size:12.5px;opacity:.92}
  .brand .logout{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:11px;
    padding:9px 11px;font-size:13px;font-weight:700;cursor:pointer}

  .container{padding:16px}
  .section-label{font-size:13px;color:var(--muted);font-weight:800;margin:8px 2px 12px;display:flex;
    align-items:center;justify-content:space-between}

  .card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:14px;
    box-shadow:var(--shadow);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:13px;margin-bottom:11px}
  .card:active{transform:scale(.985);box-shadow:var(--shadow-lg)}
  .avatar{width:50px;height:50px;border-radius:50%;background:var(--blue-light);color:var(--blue);
    display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:800;flex-shrink:0}
  .avatar.green{background:var(--green-light);color:var(--green)}
  .card-body{flex:1;min-width:0}
  .card-title{font-weight:800;font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{font-size:12.5px;color:var(--muted);margin-top:2px}
  .chev{color:var(--blue);opacity:.45;font-size:20px;flex-shrink:0}
  .count-badge{background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:800;
    padding:3px 11px;border-radius:20px;flex-shrink:0}

  .sec-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;
    font-size:22px;flex-shrink:0}
  .ic-treat{background:var(--blue-light)} .ic-lab{background:#EDE9FB} .ic-xray{background:#E9F4FB}
  .ic-physio{background:var(--green-light)} .ic-note{background:#FFF3E0}

  .note-card{background:linear-gradient(135deg,#FFF8EE,#FFF3E0);border:1px solid #F3DDB8;border-radius:16px;
    padding:15px;margin-bottom:14px;cursor:pointer}
  .note-card .nh{display:flex;align-items:center;gap:8px;font-weight:800;color:var(--amber);font-size:14px;margin-bottom:8px}
  .note-card .nt{font-size:14.5px;color:var(--ink);white-space:pre-wrap;line-height:1.6}
  .note-card .nm{font-size:12px;color:var(--muted);margin-top:9px;border-top:1px dashed #E8D3A8;padding-top:8px}

  .info-card{border-radius:16px;padding:14px;margin-bottom:11px;cursor:pointer;display:flex;align-items:center;gap:12px}
  .info-card .ii{width:46px;height:46px;border-radius:13px;background:#fff;display:flex;align-items:center;
    justify-content:center;font-size:23px;flex-shrink:0}
  .info-card .it{font-weight:800;font-size:15px}
  .info-card .is{font-size:12px;margin-top:2px}
  .ic-emerg{background:linear-gradient(135deg,#FCEBEB,#FBE0E0);border:1px solid #F3C0C0}
  .ic-emerg .ii{color:var(--red)} .ic-emerg .it{color:var(--red)} .ic-emerg .is{color:#9c5252}
  .ic-meds{background:linear-gradient(135deg,#E6F5EE,#DBF0E5);border:1px solid #BFE3D0}
  .ic-meds .ii{color:var(--green)} .ic-meds .it{color:#1f7a50} .ic-meds .is{color:#4a8268}

  .emerg-block{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:11px}
  .emerg-block .ebt{font-size:12px;color:var(--muted);font-weight:800;margin-bottom:5px}
  .emerg-block .ebv{font-size:14.5px;white-space:pre-wrap}

  .btn{background:var(--blue);color:#fff;border:none;border-radius:13px;padding:14px;font-size:15px;
    font-weight:800;width:100%;cursor:pointer;transition:.15s;font-family:inherit}
  .btn:active{transform:scale(.98);background:var(--blue-dark)}
  .btn.green{background:var(--green)} .btn.ghost{background:var(--blue-light);color:var(--blue)}
  .btn.danger{background:var(--red-light);color:var(--red)}
  .btn.sm{padding:10px;font-size:13.5px;border-radius:11px}
  .fab{position:sticky;bottom:16px;margin:16px;width:calc(100% - 32px);box-shadow:var(--shadow-lg)}

  .empty{text-align:center;padding:46px 20px;color:var(--muted)}
  .empty .e-ic{font-size:48px;margin-bottom:12px;opacity:.5}
  .empty p{font-size:14px;margin:4px 0}

  .doc-card{background:var(--white);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    box-shadow:var(--shadow);cursor:pointer;margin-bottom:12px;transition:.15s}
  .doc-card:active{transform:scale(.98)}
  .doc-card img{width:100%;height:150px;object-fit:cover;background:var(--blue-light);display:block}
  .doc-card .di{padding:11px 13px}
  .doc-card .dt{font-weight:800;font-size:14.5px}
  .doc-card .dd{font-size:12px;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between}
  .new-tag{background:var(--green);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px}

  /* med rows */
  .med-card{background:#fff;border:1px solid var(--line);border-radius:15px;padding:13px;box-shadow:var(--shadow);
    margin-bottom:11px;display:flex;align-items:center;gap:12px}
  .med-card .mi{width:44px;height:44px;border-radius:12px;background:var(--green-light);color:var(--green);
    display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .med-card .mt{font-weight:800;font-size:15px}
  .med-card .mm{font-size:12.5px;color:var(--muted);margin-top:2px}
  .time-pill{display:inline-block;background:var(--blue-light);color:var(--blue);border-radius:8px;
    padding:2px 9px;font-size:12px;font-weight:800;margin:3px 0 0 5px;direction:ltr}
  .switch{position:relative;width:46px;height:27px;flex-shrink:0;cursor:pointer}
  .switch input{display:none}
  .switch .sl{position:absolute;inset:0;background:var(--line);border-radius:20px;transition:.2s}
  .switch .sl:before{content:"";position:absolute;width:21px;height:21px;border-radius:50%;background:#fff;
    top:3px;right:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .switch input:checked + .sl{background:var(--green)}
  .switch input:checked + .sl:before{transform:translateX(-19px)}

  .overlay{position:fixed;inset:0;background:rgba(20,33,51,.5);z-index:100;display:none;
    align-items:flex-end;justify-content:center}
  .overlay.show{display:flex}
  .overlay.center{align-items:center;padding:20px}
  .sheet{background:#fff;width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:20px 18px 26px;
    max-height:92vh;overflow:auto;animation:slideUp .25s ease}
  .overlay.center .sheet{border-radius:22px;max-width:380px;animation:pop .25s ease;text-align:center}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  .sheet h2{margin:0 0 4px;font-size:19px}
  .sheet .grab{width:40px;height:4px;background:var(--line);border-radius:4px;margin:0 auto 14px}
  label{display:block;font-size:13px;font-weight:800;color:var(--ink);margin:14px 0 6px}
  input,textarea,select{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:12px;
    font-size:15px;font-family:inherit;background:var(--bg);color:var(--ink);outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--blue);background:#fff}
  textarea{resize:vertical;min-height:80px}
  .row2{display:flex;gap:10px}.row2>div{flex:1}
  .hint{font-size:12.5px;color:var(--muted);text-align:center;margin:8px 0}

  .photo-pick{border:2px dashed var(--blue-soft);border-radius:14px;padding:24px;text-align:center;
    color:var(--blue);cursor:pointer;background:var(--blue-light);font-weight:800;font-size:14px}
  .photo-pick .pp-ic{font-size:34px;display:block;margin-bottom:6px}
  .photo-preview{width:100%;border-radius:14px;margin-top:10px;max-height:240px;object-fit:cover;display:block}

  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{padding:9px 14px;border-radius:11px;border:1.5px solid var(--line);background:var(--bg);
    font-size:13px;font-weight:800;cursor:pointer;color:var(--muted)}
  .chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}

  .full-img{width:100%;border-radius:14px;margin-bottom:14px;box-shadow:var(--shadow)}
  .detail-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
  .detail-row .k{color:var(--muted)} .detail-row .v{font-weight:800}

  .search{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:13px;background:#fff;
    font-size:14px;margin-bottom:14px;font-family:inherit}

  .grid-spec{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .spec-tile{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px 14px;
    box-shadow:var(--shadow);cursor:pointer;transition:.15s;text-align:center}
  .spec-tile:active{transform:scale(.97)}
  .spec-tile .st-ic{width:52px;height:52px;border-radius:15px;background:var(--blue-light);color:var(--blue);
    display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 9px}
  .spec-tile .st-name{font-weight:800;font-size:14.5px}
  .spec-tile .st-count{font-size:11.5px;color:var(--muted);margin-top:3px}
  .add-tile{border:2px dashed var(--blue-soft);background:var(--blue-light);color:var(--blue);
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;
    border-radius:16px;cursor:pointer;font-size:14px;min-height:118px}
  .add-tile .at-ic{font-size:30px;margin-bottom:4px}

  .lab-table{width:100%;border-collapse:collapse;margin-top:6px;font-size:13.5px}
  .lab-table th{background:var(--blue-light);color:var(--blue);padding:8px 6px;font-size:12px;text-align:right}
  .lab-table td{border-bottom:1px solid var(--line);padding:7px 6px}
  .lab-table tr.out td{background:var(--red-light)}
  .lr-row{display:flex;gap:6px;margin-bottom:7px;align-items:center}
  .lr-row input{padding:9px;font-size:13px}
  .lr-row .lr-name{flex:2.2}.lr-row .lr-val{flex:1}.lr-row .lr-unit{flex:1}.lr-row .lr-ref{flex:1.4}
  .lr-row .lr-del{background:var(--red-light);color:var(--red);border:none;width:34px;height:34px;
    border-radius:9px;font-size:16px;cursor:pointer;flex-shrink:0}
  #ocrstatus{font-size:13px;color:var(--blue);background:var(--blue-light);padding:10px;border-radius:11px;
    margin-top:10px;text-align:center;font-weight:800}

  .chart-box{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-bottom:14px}
  svg .grid-l{stroke:var(--line);stroke-width:1}
  svg .ln{fill:none;stroke:var(--blue);stroke-width:2.5}
  svg .dot{fill:var(--blue)}
  svg .lbl{fill:var(--muted);font-size:10px}

  /* AUTH */
  .auth{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;
    background:var(--grad)}
  .auth .top{text-align:center;color:#fff;margin-bottom:24px}
  .auth .top .mk{width:74px;height:74px;border-radius:20px;background:rgba(255,255,255,.2);margin:0 auto 14px;
    display:flex;align-items:center;justify-content:center;font-size:38px}
  .auth .top h1{margin:0;font-size:27px;font-weight:800}
  .auth .top p{margin:5px 0 0;opacity:.9;font-size:13.5px}
  .auth-card{background:#fff;border-radius:22px;padding:22px 20px;box-shadow:var(--shadow-lg)}
  .auth-card h2{margin:0 0 4px;font-size:19px}
  .auth-card .lead{font-size:13px;color:var(--muted);margin:0 0 6px}
  .auth-err{background:var(--red-light);color:var(--red);padding:10px;border-radius:11px;font-size:13px;
    font-weight:700;margin-top:12px;text-align:center;display:none}
  .auth-switch{text-align:center;margin-top:16px;color:#fff;font-size:13.5px}
  .auth-switch a{color:#fff;font-weight:800;text-decoration:underline;cursor:pointer}

  .remind-card .rc-ic{font-size:54px;margin-bottom:6px}
  .remind-card h2{font-size:22px;color:var(--green)}
  .remind-card .rc-dose{font-size:16px;font-weight:800;margin:6px 0}
  .remind-card .rc-meta{color:var(--muted);font-size:13px;margin-bottom:18px}
</style>
</head>
<body>
<div class="app" id="app"></div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>
<div class="overlay center" id="remind"><div class="sheet remind-card" id="remindBox"></div></div>

<script>
/* ================= AUTH (local lock) ================= */
const AKEY="instacare_auth_v1"; let _authMem=null, _authed=false;
function getAccount(){try{const r=localStorage.getItem(AKEY);return r?JSON.parse(r):_authMem}catch(e){return _authMem}}
function setAccount(a){_authMem=a;try{localStorage.setItem(AKEY,JSON.stringify(a))}catch(e){}}
function isAuthed(){return _authed}
function randHex(n){const a=new Uint8Array(n);if(window.crypto&&crypto.getRandomValues)crypto.getRandomValues(a);else for(let i=0;i<n;i++)a[i]=Math.floor(Math.random()*256);return[...a].map(b=>b.toString(16).padStart(2,"0")).join("")}
async function hashPwd(pw,salt){
  const txt=salt+":"+pw;
  try{const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(txt));
    return[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("")}
  catch(e){let h=0;for(let i=0;i<txt.length;i++)h=(h*31+txt.charCodeAt(i))>>>0;return"f"+h.toString(16)}
}
let _authMode="login"; // login | signup
function viewSignup(){_authMode="signup";return authScreen(true)}
function viewLogin(){_authMode="login";return authScreen(false)}
function authScreen(signup){
  return `<div class="auth">
    <div class="top"><div class="mk">＋</div><h1>انستا كير</h1><p>كل تاريخك الطبي في مكان واحد</p></div>
    <div class="auth-card">
      <h2>${signup?"إنشاء حساب":"تسجيل الدخول"}</h2>
      <p class="lead">${signup?"اعمل حساب يقفل بياناتك على جهازك":"أدخل إيميلك وكلمة السر"}</p>
      <label>الإيميل</label><input id="a_email" type="email" inputmode="email" placeholder="example@mail.com" value="${esc((getAccount()||{}).email||'')}">
      <label>كلمة السر</label><input id="a_pw" type="password" placeholder="••••••••">
      ${signup?`<label>تأكيد كلمة السر</label><input id="a_pw2" type="password" placeholder="••••••••">`:""}
      <div class="auth-err" id="a_err"></div>
      <button class="btn" style="margin-top:18px" onclick="${signup?'doSignup()':'doLogin()'}">${signup?"إنشاء الحساب والدخول":"دخول"}</button>
    </div>
    <div class="auth-switch">${signup?`عندك حساب؟ <a onclick="renderAuth('login')">سجّل دخول</a>`:`أول مرة؟ <a onclick="renderAuth('signup')">اعمل حساب</a>`}</div>
  </div>`;
}
function renderAuth(mode){document.getElementById("app").innerHTML=mode==="signup"?viewSignup():viewLogin()}
function authErr(m){const e=document.getElementById("a_err");e.textContent=m;e.style.display="block"}
const emailOk=e=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
async function doSignup(){
  const email=val("a_email").trim().toLowerCase(),pw=val("a_pw"),pw2=val("a_pw2");
  if(!emailOk(email))return authErr("اكتب إيميل صحيح");
  if(pw.length<4)return authErr("كلمة السر لازم 4 حروف على الأقل");
  if(pw!==pw2)return authErr("كلمتا السر مش متطابقتين");
  const salt=randHex(8);const hash=await hashPwd(pw,salt);
  setAccount({email,salt,hash});_authed=true;render();
}
async function doLogin(){
  const acc=getAccount();const email=val("a_email").trim().toLowerCase(),pw=val("a_pw");
  if(!acc)return renderAuth("signup");
  if(email!==acc.email)return authErr("الإيميل غير مسجّل على الجهاز ده");
  const hash=await hashPwd(pw,acc.salt);
  if(hash!==acc.hash)return authErr("كلمة السر غلط");
  _authed=true;render();
}
function logout(){if(!confirm("تسجيل خروج؟"))return;_authed=false;renderAuth("login")}

/* ================= Data layer ================= */
const KEY="instacare_v1"; let _mem=null; let DB=load();
function load(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):{profiles:[]}}catch(e){return _mem||{profiles:[]}}}
function save(){_mem=DB;try{localStorage.setItem(KEY,JSON.stringify(DB))}catch(e){}}
function uid(){return Math.random().toString(36).slice(2,10)}
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(s){if(!s)return"";const[y,m,d]=s.split("-");return `${d}/${m}/${y}`}

const SECTIONS=[
  {id:"note", name:"ملاحظة آخر دكتور", icon:"📝", cls:"ic-note"},
  {id:"treat",name:"علاج / روشتات",   icon:"🩺", cls:"ic-treat"},
  {id:"lab",  name:"تحاليل",          icon:"🔬", cls:"ic-lab"},
  {id:"xray", name:"أشعة",            icon:"📷", cls:"ic-xray"},
  {id:"physio",name:"علاج طبيعي",     icon:"🏃", cls:"ic-physio"},
];
const SPEC_PRESETS=["قلب","عظام","أسنان","باطنة","جلدية","أنف وأذن","عيون","مسالك","نساء","أطفال","مخ وأعصاب","صدر"];
const SPEC_ICON="🏥";

let nav={view:"home",pid:null,sid:null,sec:null,docId:null,q:"",track:""};
function go(v,opts={}){nav={...nav,view:v,...opts};render();window.scrollTo(0,0)}
const getP=()=>DB.profiles.find(p=>p.id===nav.pid);
const getS=()=>{const p=getP();return p&&p.specs.find(s=>s.id===nav.sid)};

/* ================= Render ================= */
function render(){
  if(!isAuthed()){document.getElementById("app").innerHTML=getAccount()?viewLogin():viewSignup();return;}
  ensureReminders();
  const map={home:viewHome,profile:viewProfile,specialty:viewSpecialty,section:viewSection,
    doc:viewDoc,emergency:viewEmergency,meds:viewMeds,labtrack:viewLabTrack};
  document.getElementById("app").innerHTML=(map[nav.view]||viewHome)();
}
function header(title,sub,onBack){
  return `<header>
    ${onBack?`<button class="back" onclick="${onBack}">‹</button>`:`<div class="logo-dot">＋</div>`}
    <div class="titles"><h1>${esc(title)}</h1>${sub?`<div class="sub">${esc(sub)}</div>`:""}</div>

let _remTimer=null,_fired={};
function ensureReminders(){if(_remTimer)return;_remTimer=setInterval(checkReminders,20000);checkReminders()}
function checkReminders(){
  const d=new Date(),now=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"),day=today();
  DB.profiles.forEach(p=>(p.meds||[]).forEach(m=>{if(m.active===false)return;
    (m.times||[]).forEach(t=>{if(t===now){const k=day+"|"+p.id+"|"+m.id+"|"+t;if(!_fired[k]){_fired[k]=1;fireReminder(p,m,t)}}})}));
}
function fireReminder(p,m,t){
  try{if(navigator.vibrate)navigator.vibrate([400,150,400,150,400])}catch(e){}
  try{if("Notification"in window&&Notification.permission==="granted")
    new Notification("💊 وقت الدوا: "+m.name,{body:(m.dose?m.dose+" • ":"")+p.name+" • "+t,icon:"icon.svg",tag:m.id+t})}catch(e){}
  const box=document.getElementById("remindBox");
  box.innerHTML=`<div class="rc-ic">💊</div><h2>وقت الدوا!</h2>
    <div class="rc-dose">${esc(m.name)}${m.dose?" — "+esc(m.dose):""}</div>
    <div class="rc-meta">${esc(p.name)} • الساعة ${t}${m.note?" • "+esc(m.note):""}</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn green" onclick="closeRemind()">خدته ✅</button>
      <button class="btn ghost" onclick="closeRemind()">تأجيل</button></div>`;
  document.getElementById("remind").classList.add("show");
}

function viewLabTrack(){
  const p=getP(),s=getS(); if(!s)return go("profile");
  const docs=(s.docs.lab||[]);
  const names=[...new Set([].concat(...docs.map(d=>(d.labRows||[]).map(r=>r.name.trim()))).filter(Boolean))];
  if(!names.length)return header("📈 متابعة الأرقام",s.name,"go('section',{sec:'lab'})")+`<div class="container">${empty("📈","مفيش أرقام تحاليل","ضيف تحليل وحط نتايجه الأول")}</div>`;
  const sel=nav.track&&names.includes(nav.track)?nav.track:names[0];
  let points=[];
  docs.forEach(d=>(d.labRows||[]).forEach(r=>{if(r.name.trim()===sel){const v=parseFloat(String(r.value).replace(/[^\d.\-]/g,''));if(!isNaN(v)&&d.date)points.push({date:d.date,value:v})}}));
  points.sort((a,b)=>a.date.localeCompare(b.date));
  return header("📈 متابعة الأرقام",s.name,"go('section',{sec:'lab'})")+`<div class="container">
    <label>اختر التحليل</label><select onchange="go('labtrack',{track:this.value})">${names.map(n=>`<option value="${esc(n)}" ${n===sel?'selected':''}>${esc(n)}</option>`).join("")}</select>
    <div class="chart-box" style="margin-top:14px">${lineChart(points)}</div>
    ${points.length?`<table class="lab-table"><tr><th>التاريخ</th><th>القيمة</th></tr>${points.slice().reverse().map(pt=>`<tr><td>${fmtDate(pt.date)}</td><td><b>${pt.value}</b></td></tr>`).join("")}</table>`:""}</div>`;
}
function lineChart(points){
  if(!points.length)return empty("📊","مفيش قراءات","");
  const W=420,H=190,pad=34,n=points.length,vals=points.map(p=>p.value),min=Math.min(...vals),max=Math.max(...vals),range=(max-min)||1;
  const X=i=>pad+(n===1?(W-2*pad)/2:i*(W-2*pad)/(n-1)),Y=v=>H-pad-((v-min)/range)*(H-2*pad);
  const pts=points.map((p,i)=>`${X(i)},${Y(p.value)}`).join(" ");
  const dots=points.map((p,i)=>`<circle class="dot" cx="${X(i)}" cy="${Y(p.value)}" r="4"></circle>
    <text class="lbl" x="${X(i)}" y="${Y(p.value)-9}" text-anchor="middle">${p.value}</text>
    <text class="lbl" x="${X(i)}" y="${H-12}" text-anchor="middle">${fmtDate(p.date).slice(0,5)}</text>`).join("");
  const grid=[0,.5,1].map(t=>{const y=pad+t*(H-2*pad);return `<line class="grid-l" x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}"></line>`}).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${grid}<polyline class="ln" points="${pts}"></polyline>${dots}</svg>`;
}

    <div class="row2"><div><label>صلة القرابة</label><input id="f_rel" value="${p?esc(p.relation||""):""}" placeholder="أنا / ابني / ماما"></div>
    <div><label>تاريخ الميلاد</label><input id="f_birth" type="date" value="${p?p.birth||"":""}"></div></div>
    <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
      <button class="btn" onclick="saveProfile('${id||""}')">حفظ</button>
      ${p?`<button class="btn danger" onclick="delProfile('${id}')">حذف الملف</button>`:""}</div>`);
}
function saveProfile(id){
  const name=val("f_name").trim(); if(!name)return alert("اكتب الاسم");
  const rel=val("f_rel").trim(),birth=val("f_birth");
  if(id){const p=DB.profiles.find(x=>x.id===id);p.name=name;p.relation=rel;p.birth=birth;}
  else DB.profiles.push({id:uid(),name,relation:rel,birth,color:DB.profiles.length%2?"green":"",specs:[],emergency:{},meds:[]});
  save();closeSheet();render();
}
function delProfile(id){if(!confirm("حذف الملف وكل وثائقه؟"))return;DB.profiles=DB.profiles.filter(x=>x.id!==id);save();closeSheet();go("home")}

function sheetSpec(){
  openSheet(`<h2>إضافة تخصص</h2>
    <label>اختر تخصص</label><div class="chips" style="margin-bottom:6px">${SPEC_PRESETS.map(n=>`<div class="chip" onclick="pickSpec(this,'${n}')">${n}</div>`).join("")}</div>
    <label>أو اكتب تخصص آخر</label><input id="f_spec" placeholder="اسم التخصص">
    <button class="btn" style="margin-top:20px" onclick="saveSpec()">إضافة</button>`);
}
function pickSpec(el,n){document.getElementById("f_spec").value=n;document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));el.classList.add("active")}
function saveSpec(){const name=val("f_spec").trim();if(!name)return alert("اختر أو اكتب تخصص");getP().specs.push({id:uid(),name,note:null,docs:{}});save();closeSheet();render()}
function delSpec(){if(!confirm("حذف التخصص وكل أقسامه؟"))return;const p=getP();p.specs=p.specs.filter(s=>s.id!==nav.sid);save();go("profile")}

function sheetNote(){
  const n=getS().note||{};
  openSheet(`<h2>📝 ملاحظة آخر دكتور</h2>
    <label>الملاحظة / التشخيص</label><textarea id="n_text" placeholder="اكتب ملخّص كلام الدكتور...">${n.text?esc(n.text):""}</textarea>
    <div class="row2"><div><label>اسم الدكتور</label><input id="n_doc" value="${n.doctor?esc(n.doctor):""}" placeholder="د. ..."></div>
    <div><label>تاريخ الزيارة</label><input id="n_date" type="date" value="${n.date||today()}"></div></div>
    <label>الخطوة الجاية</label><input id="n_next" value="${n.next?esc(n.next):""}" placeholder="مثلاً: إعادة تحليل بعد شهر">
    <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
      <button class="btn" onclick="saveNote()">حفظ</button>
      ${n.text?`<button class="btn danger" onclick="clearNote()">مسح الملاحظة</button>`:""}</div>`);
}
function saveNote(){const text=val("n_text").trim();if(!text)return alert("اكتب الملاحظة");getS().note={text,doctor:val("n_doc").trim(),date:val("n_date"),next:val("n_next").trim()};save();closeSheet();render()}
function clearNote(){getS().note=null;save();closeSheet();render()}

let _img=null,_labRows=[];
function sheetDoc(id){
  const s=getS(); _img=null;_labRows=[]; let d=null;
  if(id){d=(s.docs[nav.sec]||[]).find(x=>x.id===id);_img=d.img||null;_labRows=(d.labRows||[]).map(r=>({...r}));}
  const isLab=nav.sec==="lab";
  openSheet(`<h2>${d?"تعديل وثيقة":"وثيقة جديدة"}</h2>
    <div class="photo-pick" onclick="document.getElementById('f_file').click()"><span class="pp-ic">📷</span> اضغط للتصوير أو اختيار صورة</div>
    <input id="f_file" type="file" accept="image/*" capture="environment" style="display:none" onchange="onPhoto(event)">
    <img id="prev" class="photo-preview" style="${_img?'':'display:none'}" src="${_img||''}">
    <label>عنوان الوثيقة</label><input id="d_title" value="${d?esc(d.title):""}" placeholder="${isLab?'مثلاً: صورة دم كاملة':'مثلاً: صورة رنين'}">
    <div class="row2"><div><label>التاريخ</label><input id="d_date" type="date" value="${d?d.date:today()}"></div>
    <div><label>الدكتور / المكان</label><input id="d_doc" value="${d?esc(d.doctor||""):""}" placeholder="اختياري"></div></div>
    ${isLab?`<label style="margin-top:18px">🔬 نتائج التحاليل</label>
      <button class="btn ghost sm" onclick="runOCR()">✨ اقرأ الأرقام من الصورة تلقائيًا</button>
      <div id="ocrstatus" style="display:none"></div>
      <div id="labwrap" style="margin-top:10px">${renderLabEditor()}</div>
      <button class="btn ghost sm" style="margin-top:4px" onclick="addLabRow()">＋ إضافة صف</button>`:""}
    <label style="margin-top:18px">ملاحظات</label><textarea id="d_note" placeholder="اختياري">${d?esc(d.note||""):""}</textarea>
    <button class="btn" style="margin-top:20px" onclick="saveDoc('${id||""}')">حفظ الوثيقة</button>`);
}
function renderLabEditor(){
  if(!_labRows.length)return `<p class="hint">مفيش صفوف — اضغط "اقرأ تلقائيًا" أو "إضافة صف"</p>`;
  return _labRows.map((r,i)=>`<div class="lr-row">
    <input class="lr lr-name" data-i="${i}" data-k="name" value="${esc(r.name)}" placeholder="التحليل">
    <input class="lr lr-val" data-i="${i}" data-k="value" value="${esc(r.value)}" placeholder="القيمة">
    <input class="lr lr-unit" data-i="${i}" data-k="unit" value="${esc(r.unit||'')}" placeholder="وحدة">
    <input class="lr lr-ref" data-i="${i}" data-k="ref" value="${esc(r.ref||'')}" placeholder="المعدل">
    <button class="lr-del" onclick="removeLabRow(${i})">✕</button></div>`).join("");
}
function readLabInputs(){document.querySelectorAll('.lr').forEach(inp=>{const i=+inp.dataset.i,k=inp.dataset.k;if(_labRows[i])_labRows[i][k]=inp.value})}
function refreshLab(){document.getElementById('labwrap').innerHTML=renderLabEditor()}
function addLabRow(){readLabInputs();_labRows.push({name:"",value:"",unit:"",ref:""});refreshLab()}
function removeLabRow(i){readLabInputs();_labRows.splice(i,1);refreshLab()}
function onPhoto(e){
  const file=e.target.files[0]; if(!file)return; const r=new FileReader();
  r.onload=ev=>{const img=new Image();img.onload=()=>{
    const max=1100,sc=Math.min(1,max/Math.max(img.width,img.height));
    const c=document.createElement("canvas");c.width=img.width*sc;c.height=img.height*sc;
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);_img=c.toDataURL("image/jpeg",.7);
    const pv=document.getElementById("prev");pv.src=_img;pv.style.display="block";
  };img.src=ev.target.result;};r.readAsDataURL(file);
}
function saveDoc(id){
  const title=val("d_title").trim(); if(!title)return alert("اكتب عنوان الوثيقة");
  const s=getS(); if(!s.docs[nav.sec])s.docs[nav.sec]=[];
  if(nav.sec==="lab")readLabInputs();
  const labRows=nav.sec==="lab"?_labRows.filter(r=>r.name.trim()&&String(r.value).trim()):undefined;
  const data={title,date:val("d_date"),doctor:val("d_doc").trim(),note:val("d_note").trim(),img:_img,labRows};
  if(id){const d=s.docs[nav.sec].find(x=>x.id===id);Object.assign(d,data);}
  else s.docs[nav.sec].push({id:uid(),...data});
  save();closeSheet();render();
}
function delDoc(id){if(!confirm("حذف الوثيقة؟"))return;const s=getS();s.docs[nav.sec]=s.docs[nav.sec].filter(x=>x.id!==id);save();go("section")}

function loadTesseract(){return new Promise((res,rej)=>{if(window.Tesseract)return res();
  const sc=document.createElement("script");sc.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
  sc.onload=res;sc.onerror=()=>rej(new Error("load"));document.head.appendChild(sc);})}
async function runOCR(){
  if(!_img)return alert("صوّر أو اختار صورة التحليل الأول");
  const st=document.getElementById("ocrstatus");st.style.display="block";st.textContent="⏳ بحمّل محرّك القراءة...";
  try{
    await loadTesseract();st.textContent="🔍 بقرأ الصورة... (ممكن تاخد شوية)";
    const {data}=await Tesseract.recognize(_img,"eng",{logger:m=>{if(m.status==="recognizing text")st.textContent="🔍 بقرأ... "+Math.round(m.progress*100)+"%"}});
    const rows=parseLab(data.text||"");
    if(!rows.length){st.textContent="معرفتش أطلّع أرقام واضحة — ضيفها يدوي 🙏";return}
    readLabInputs();_labRows=_labRows.concat(rows);refreshLab();
    st.textContent="✅ طلّعت "+rows.length+" نتيجة — راجعها وعدّل لو محتاج";
  }catch(e){st.textContent="⚠️ فيه مشكلة في القراءة — تأكد إنك متصل بالنت وجرّب تاني"}
}
function parseLab(text){
  const rows=[];
  text.split(/\n/).forEach(line=>{line=line.replace(/\s+/g," ").trim();if(line.length<3)return;
    const m=line.match(/^(.+?)\s*[:\-]?\s*(-?\d+(?:[.,]\d+)?)\s*([a-zA-Z%µ\/]+(?:\/[a-zA-Z]+)?)?\b/);
    if(m&&/[a-zA-Z؀-ۿ]/.test(m[1])&&m[1].trim().length>=2)rows.push({name:m[1].trim().replace(/[._]+$/,""),value:m[2].replace(",","."),unit:(m[3]||"").trim(),ref:""});});
  return rows.slice(0,40);
}

/* ================= utils ================= */
function val(id){const e=document.getElementById(id);return e?e.value:""}
function esc(s){return(s==null?"":""+s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function initial(n){return(n||"؟").trim()[0]||"؟"}
function truncate(s,n){return s.length>n?s.slice(0,n)+"…":s}
function empty(ic,t,sub){return `<div class="empty"><div class="e-ic">${ic}</div><p style="font-weight:800;color:var(--ink)">${t}</p>${sub?`<p>${sub}</p>`:""}</div>`}
function countDocs(p){let c=0;p.specs.forEach(s=>c+=specCount(s));return c}
function specCount(s){let c=0;Object.values(s.docs||{}).forEach(a=>c+=a.length);return c}
function isOut(r){const v=parseFloat(String(r.value).replace(/[^\d.\-]/g,""));const m=String(r.ref||"").match(/(-?\d+(?:\.\d+)?)\s*[-–]\s*(-?\d+(?:\.\d+)?)/);if(isNaN(v)||!m)return false;return v<parseFloat(m[1])||v>parseFloat(m[2])}
function searchDocs(p,q){q=q.toLowerCase();const out=[];
  p.specs.forEach(s=>Object.keys(s.docs||{}).forEach(sec=>(s.docs[sec]||[]).forEach(d=>{
    const hay=((d.title||"")+" "+(d.doctor||"")+" "+(d.note||"")+" "+((d.labRows||[]).map(r=>r.name).join(" "))).toLowerCase();
    if(hay.includes(q))out.push({doc:d,sec,sid:s.id,specName:s.name});})));
  return out.sort((a,b)=>(b.doc.date||"").localeCompare(a.doc.date||""));}

/* ================= boot ================= */
if("serviceWorker"in navigator){try{navigator.serviceWorker.register("sw.js").catch(()=>{})}catch(e){}}
render();
</script>
</body>
</html>
